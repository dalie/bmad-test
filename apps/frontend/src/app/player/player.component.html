<main class="player-container">
  <button type="button" class="back-link" (click)="location.back()">← Back</button>

  @if (isTier2) {
    <video
      #videoEl
      class="player-video"
      [src]="videoSrc"
      muted
      autoplay
      controls
      preload="auto"
    ></video>
    <audio #audioEl [src]="audioSrc" preload="auto"></audio>
  } @else {
    <video class="player-video" [src]="videoSrc" autoplay controls preload="auto"></video>
  }
</main>
