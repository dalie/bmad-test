services:
  cineplex-rigaud:
    build: .
    container_name: cineplex-rigaud
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - path: .env
        required: false
    environment:
      - MEDIA_MOVIES_PATH=/mnt/media/movies
      - MEDIA_TV_PATH=/mnt/media/tv
      - MEDIA_OTHER_PATH=/mnt/media/other
      - CACHE_PATH=/mnt/cache
    volumes:
      - ${MOVIES_HOST_PATH:-~/media/movies}:/mnt/media/movies:ro
      - ${TV_HOST_PATH:-~/media/tv}:/mnt/media/tv:ro
      - ${OTHER_HOST_PATH:-~/media/other}:/mnt/media/other:ro
      - cache:/mnt/cache
    restart: unless-stopped

volumes:
  cache:
